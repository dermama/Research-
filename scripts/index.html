<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        /**
         * Search using DuckDuckGo Instant Answer API with Wikipedia fallback.
         */
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const parsedData = JSON.parse(data);
                const query = parsedData.query;

                if (!query) {
                    return JSON.stringify({ error: "Missing 'query' parameter." });
                }

                // --- Attempt 1: DuckDuckGo Instant Answer API (via CORS proxy) ---
                try {
                    const ddgUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(ddgUrl)}`;

                    const ddgResponse = await fetch(proxyUrl);
                    if (ddgResponse.ok) {
                        const proxyData = await ddgResponse.json();
                        const json = JSON.parse(proxyData.contents);

                        if (json.AbstractText && json.AbstractText.length > 20) {
                            return JSON.stringify({
                                result: `📖 ${json.AbstractText}\n\n🔗 Source: ${json.AbstractSource || 'DuckDuckGo'} — ${json.AbstractURL || ''}`
                            });
                        }

                        if (json.Answer) {
                            return JSON.stringify({
                                result: `✅ ${json.Answer}`
                            });
                        }

                        // Try related topics
                        if (json.RelatedTopics && json.RelatedTopics.length > 0) {
                            const topics = json.RelatedTopics
                                .slice(0, 4)
                                .filter(t => t.Text && t.Text.length > 10)
                                .map(t => `• ${t.Text}`)
                                .join('\n');
                            if (topics) {
                                return JSON.stringify({
                                    result: `🔍 DuckDuckGo results for "${query}":\n\n${topics}`
                                });
                            }
                        }
                    }
                } catch (ddgError) {
                    console.warn("DuckDuckGo failed, trying Wikipedia...", ddgError.message);
                }

                // --- Attempt 2: Wikipedia Search API (native CORS support) ---
                const wikiSearchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srlimit=3&format=json&origin=*`;
                const wikiResponse = await fetch(wikiSearchUrl);

                if (wikiResponse.ok) {
                    const wikiData = await wikiResponse.json();
                    const results = wikiData.query?.search;

                    if (results && results.length > 0) {
                        // Get the intro of the top result
                        const topTitle = results[0].title;
                        const introUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=true&explaintext=true&titles=${encodeURIComponent(topTitle)}&format=json&origin=*`;
                        const introResponse = await fetch(introUrl);

                        if (introResponse.ok) {
                            const introData = await introResponse.json();
                            const pages = introData.query?.pages;
                            const page = pages ? Object.values(pages)[0] : null;
                            const extract = page?.extract;

                            if (extract) {
                                // Trim to first 600 chars
                                const trimmed = extract.length > 600 ? extract.substring(0, 600) + '...' : extract;
                                return JSON.stringify({
                                    result: `📚 Wikipedia: ${topTitle}\n\n${trimmed}\n\n🔗 https://en.wikipedia.org/wiki/${encodeURIComponent(topTitle)}`
                                });
                            }
                        }

                        // Fallback: just return search snippet
                        const snippets = results
                            .map(r => `• ${r.title}: ${r.snippet.replace(/<[^>]+>/g, '')}`)
                            .join('\n\n');
                        return JSON.stringify({
                            result: `🔍 Wikipedia results for "${query}":\n\n${snippets}`
                        });
                    }
                }

                // --- No results from any source ---
                return JSON.stringify({
                    result: `❌ No results found for "${query}". Please try a different or more specific query.`
                });

            } catch (error) {
                console.error("Skill Error:", error);
                return JSON.stringify({
                    error: `Search failed: ${error.message}`
                });
            }
        };
    </script>
</body>
</html>
