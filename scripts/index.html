<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        /**
         * Fetches REAL DuckDuckGo search results by scraping the HTML version.
         * Uses a CORS proxy (allorigins.win) to bypass WebView restrictions.
         */
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const parsedData = JSON.parse(data);
                const query = parsedData.query;

                if (!query) {
                    return JSON.stringify({ error: "Missing 'query' parameter." });
                }

                // DuckDuckGo HTML endpoint (returns real search results as HTML)
                const ddgHtmlUrl = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(query)}&kl=wt-wt`;

                // CORS proxy to allow WebView fetch
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(ddgHtmlUrl)}`;

                const response = await fetch(proxyUrl);

                if (!response.ok) {
                    throw new Error(`Proxy error: ${response.status}`);
                }

                const proxyData = await response.json();
                const htmlContent = proxyData.contents;

                if (!htmlContent) {
                    throw new Error("Empty proxy response.");
                }

                // Parse the returned HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');

                const results = [];

                // Primary selectors used in DuckDuckGo HTML layout
                const resultElements = doc.querySelectorAll('.result');

                for (const el of resultElements) {
                    if (results.length >= 5) break;

                    const titleEl = el.querySelector('.result__a');
                    const snippetEl = el.querySelector('.result__snippet');
                    const urlEl = el.querySelector('.result__url');

                    if (!titleEl) continue;

                    const title = titleEl.textContent?.trim() || '';
                    const snippet = snippetEl?.textContent?.trim() || '';
                    const url = urlEl?.textContent?.trim() || '';

                    if (title.length > 2) {
                        results.push({ title, snippet, url });
                    }
                }

                // Fallback: try alternative selectors if primary failed
                if (results.length === 0) {
                    const altLinks = doc.querySelectorAll('a.result__a, h2 a, .results_links a');
                    for (const link of altLinks) {
                        if (results.length >= 5) break;
                        const title = link.textContent?.trim() || '';
                        const url = link.getAttribute('href') || '';
                        if (title.length > 3 && !title.includes('DuckDuckGo')) {
                            results.push({ title, snippet: '', url });
                        }
                    }
                }

                if (results.length === 0) {
                    return JSON.stringify({
                        result: `❌ No DuckDuckGo results found for: "${query}". Try rephrasing your query.`
                    });
                }

                // Format results in a readable way for the LLM
                const formatted = results
                    .map((r, i) => [
                        `${i + 1}. ${r.title}`,
                        r.snippet ? `   ${r.snippet}` : '',
                        r.url ? `   🔗 ${r.url}` : ''
                    ].filter(Boolean).join('\n'))
                    .join('\n\n');

                return JSON.stringify({
                    result: `🦆 DuckDuckGo — Top results for: "${query}"\n\n${formatted}`
                });

            } catch (error) {
                console.error("Skill Error:", error);
                return JSON.stringify({
                    error: `Search failed: ${error.message}`
                });
            }
        };
    </script>
</body>
</html>
